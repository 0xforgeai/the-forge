[build]
builder = "NIXPACKS"
buildCommand = "npm install && cd frontend && npm install --legacy-peer-deps && npx vite build"

[deploy]
startCommand = "npx prisma db push --skip-generate --accept-data-loss && node src/server.js"
healthcheckPath = "/api/stats"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
