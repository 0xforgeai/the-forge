<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="800" height="200" fill="#0a0a0a"/>
  <!-- Small mark -->
  <g transform="translate(100,100) scale(0.5)" filter="url(#glow)">
    <g fill="none" stroke="#4ADE80" stroke-width="4" stroke-linecap="round">
      <path d="M-50,120 L50,120 L50,100 L30,100 L30,80 L-30,80 L-30,100 L-50,100 Z" fill="#4ADE80" stroke="none"/>
      <rect x="-22" y="-20" width="44" height="100" fill="#4ADE80" stroke="none"/>
      <path d="M-80,-20 L120,-20 L130,-50 L120,-80 L-60,-80 L-80,-80 L-90,-50 Z" fill="#4ADE80" stroke="none"/>
      <path d="M-90,-50 L-130,-45 L-140,-40" stroke="#4ADE80" stroke-width="8" fill="none"/>
      <path d="M-10,75 L-10,-15" stroke="#0a0a0a" stroke-width="2.5"/>
      <path d="M10,75 L10,-15" stroke="#0a0a0a" stroke-width="2.5"/>
      <path d="M0,75 L0,-15" stroke="#0a0a0a" stroke-width="2.5"/>
      <path d="M-10,40 L-40,40 L-40,-15" stroke="#0a0a0a" stroke-width="2"/>
      <path d="M10,20 L40,20 L40,-15" stroke="#0a0a0a" stroke-width="2"/>
    </g>
  </g>
  <!-- Wordmark text -->
  <text x="200" y="115" font-family="'SF Mono','Fira Code','JetBrains Mono','Courier New',monospace" font-size="64" font-weight="700" fill="#4ADE80" letter-spacing="12">THE FORGE</text>
</svg>
